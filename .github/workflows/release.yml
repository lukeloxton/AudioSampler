name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release
        run: |
          swift build -c release
          BINARY="$(swift build -c release --show-bin-path)/AudioSampler"
          mkdir -p "AudioSampler.app/Contents/MacOS"
          mkdir -p "AudioSampler.app/Contents/Resources"
          cp "$BINARY" "AudioSampler.app/Contents/MacOS/AudioSampler"
          cp Info.plist "AudioSampler.app/Contents/"
          ditto -c -k --sequesterRsrc --keepParent "AudioSampler.app" "AudioSampler.app.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: AudioSampler.app.zip
          generate_release_notes: true
